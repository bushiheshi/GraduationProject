<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 - AIGC 教学平台</title>
    <link rel="stylesheet" href="/frontend/styles.css?v=20260428-bg-balanced" />
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  </head>
  <body class="auth-page">
    <header class="auth-globalnav" aria-label="全局导航">
      <div class="auth-globalnav-inner">
        <a class="auth-brand" href="/" aria-label="AIGC Classroom 首页">
          <span class="auth-brand-mark">AI</span>
          <span>AIGC Classroom</span>
        </a>
        <span class="auth-nav-title">教学 AI 账号</span>
      </div>
    </header>

    <main id="app" class="container auth-shell">
      <section class="auth-card" aria-labelledby="auth-title">
        <div class="auth-mark" aria-hidden="true">AI</div>
        <p class="eyebrow">AIGC Account</p>
        <h1 id="auth-title">登录 AIGC 账号</h1>
        <p class="desc">使用学校分配的账号登录学生端或教师端。</p>

        <role-switch :role="role" @update:role="setRole"></role-switch>

        <form class="form" @submit.prevent="submitLogin">
          <label>账号</label>
          <input v-model.trim="account" minlength="3" maxlength="64" autocomplete="username" required placeholder="请输入账号" />

          <label>密码</label>
          <input v-model="password" type="password" minlength="6" maxlength="128" autocomplete="current-password" required placeholder="请输入密码" />

          <button class="primary" type="submit" :disabled="loading">{{ loading ? '登录中...' : '登录并进入' }}</button>
        </form>

        <p :class="['message', messageType]">{{ message }}</p>

        <session-card
          v-if="sessionUser"
          :user="sessionUser"
          :format-time="formatTime"
          @enter-workspace="goWorkspace"
          @logout="logout"
        ></session-card>
      </section>
    </main>

    <footer class="auth-footer" aria-label="页面信息">
      <span>Copyright © 2026 AIGC Classroom. All rights reserved.</span>
      <span>学校账号登录服务</span>
    </footer>

    <script src="/frontend/login.js?v=20260428-no-defaults"></script>
  </body>
</html>
